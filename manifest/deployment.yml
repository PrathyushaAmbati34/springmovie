---
apiVersion: apps/v1
kind: Deployment
metadata:
 name: spring-app
spec:
 replicas: 1  # :white_check_mark: one replica as you wanted
 selector:
   matchLabels:
     app: spring-app
 template:
   metadata:
     labels:
       app: spring-app
   spec:
     containers:
     - name: spring-container
       image: pandaambati/springmaven:j11
       ports:
       - containerPort: 8081
